<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Typing Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="keyboard-card">

    <h1>⌨ Keyboard Typing Visualizer</h1>

    <p class="info">
      Press any key on your keyboard
    </p>

    <!-- DISPLAY -->
    <div class="display">

      <div class="key-box">
        <span class="label">Key</span>
        <h2 id="keyText">-</h2>
      </div>

      <div class="key-box">
        <span class="label">Key Code</span>
        <h2 id="codeText">-</h2>
      </div>

    </div>

    <!-- KEYBOARD -->
    <div class="keyboard">

      <!-- ROW 1 -->
      <div class="row">
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
      </div>

      <!-- ROW 2 -->
      <div class="row">
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
      </div>

      <!-- ROW 3 -->
      <div class="row">
        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key">M</div>
      </div>

      <!-- SPACE -->
      <div class="row">
        <div class="space-key key">
          SPACE
        </div>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
