<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>(53)xpense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Expense Tracker</h2>

  <!-- Balance -->
  <div class="balance">
    <h3>Your Balance</h3>
    <h1 id="balance">₹0</h1>
  </div>

  <!-- Income / Expense -->
  <div class="summary">
    <div class="income">
      <h4>Income</h4>
      <p id="income">₹0</p>
    </div>
    <div class="expense">
      <h4>Expense</h4>
      <p id="expense">₹0</p>
    </div>
  </div>

  <!-- List -->
  <ul id="list" class="list"></ul>

  <!-- Form -->
  <form id="form">
    <input type="text" id="text" placeholder="Enter description" required>
    <input type="number" id="amount" placeholder="Amount (+income / -expense)" required>
    <button>Add Transaction</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
