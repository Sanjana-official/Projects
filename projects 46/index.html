<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>(46)Newsletter Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Stay Updated ✨</h1>
        <p>Subscribe to our newsletter and never miss updates.</p>

        <div class="form">
            <input type="email" id="email" placeholder="Enter your email">
            <button id="subscribe">Subscribe</button>
        </div>

        <p class="message" id="message"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
