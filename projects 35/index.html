<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>(35)Number Guessing Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">
    <P style="font-size: 29PX; font-weight: 500;">PROJECT 35</P>
    <h2>Guess the Number (1 - 100)</h2>

    <input type="number" id="guess" placeholder="Enter number">

    <button onclick="checkGuess()">Guess</button>

    <p id="message"></p>

    <button onclick="resetGame()" class="reset">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
