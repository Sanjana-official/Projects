<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(89)Grocery List App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="grocery-card">

    <h1>🛒 Grocery List</h1>

    <!-- INPUT AREA -->
    <div class="input-area">

      <input
        type="text"
        id="itemInput"
        placeholder="Add grocery item..."
      >

      <button id="addBtn">
        Add
      </button>

    </div>

    <!-- LIST -->
    <ul id="groceryList">

      <!-- ITEMS HERE -->

    </ul>

    <!-- FOOTER -->
    <div class="footer">

      <p id="totalItems">
        Total Items: 0
      </p>

      <button id="clearBtn">
        Clear All
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
