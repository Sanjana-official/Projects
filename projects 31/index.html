<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle Clock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<p style="font-size: 300PX;">PROJECT 31</p>
<div class="clock">

    <div class="circle">
        <span id="hours">00</span>
        <p>Hours</p>
    </div>

    <div class="circle">
        <span id="minutes">00</span>
        <p>Minutes</p>
    </div>

    <div class="circle">
        <span id="seconds">00</span>
        <p>Seconds</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
