<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(92)Sudoku Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="game-card">

    <h1>🧩 Sudoku Game</h1>

    <!-- BOARD -->
    <div class="board" id="board">

      <!-- CELLS GENERATED BY JS -->

    </div>

    <!-- BUTTONS -->
    <div class="buttons">

      <button id="checkBtn">
        Check
      </button>

      <button id="resetBtn">
        Reset
      </button>

    </div>

    <!-- RESULT -->
    <div class="result" id="result">
      Fill the puzzle and click Check
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
