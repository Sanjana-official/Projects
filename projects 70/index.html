<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>(70)Tabs Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs-container">
  
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="1">Home</button>
    <button class="tab" data-tab="2">About</button>
    <button class="tab" data-tab="3">Contact</button>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="tab-content active" data-content="1">
      <h3>Home</h3>
      <p>Welcome to the home section.</p>
    </div>

    <div class="tab-content" data-content="2">
      <h3>About</h3>
      <p>This is about section.</p>
    </div>

    <div class="tab-content" data-content="3">
      <h3>Contact</h3>
      <p>Contact us here.</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
