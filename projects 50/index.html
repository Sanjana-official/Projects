<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>(50)Split Screen Landing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="split-container">

  <!-- LEFT -->
  <div class="panel left">
    <div class="overlay"></div>
    <div class="content">
      <h1>For Students</h1>
      <p>Learn, build and grow your skills with hands-on projects.</p>
      <button>Explore</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel right">
    <div class="overlay"></div>
    <div class="content">
      <h1>For Developers</h1>
      <p>Create powerful applications with modern tools.</p>
      <button>Get Started</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
