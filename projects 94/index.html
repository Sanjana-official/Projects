<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(94)Budget Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="budget-card">

    <h1>💰 Budget Planner</h1>

    <!-- BALANCE -->
    <div class="balance-box">

      <h2>Total Balance</h2>

      <p id="balance">
        ₹0
      </p>

    </div>

    <!-- INPUTS -->
    <div class="input-area">

      <input
        type="text"
        id="titleInput"
        placeholder="Expense title"
      >

      <input
        type="number"
        id="amountInput"
        placeholder="Amount"
      >

      <select id="typeInput">

        <option value="income">
          Income
        </option>

        <option value="expense">
          Expense
        </option>

      </select>

      <button id="addBtn">
        Add
      </button>

    </div>

    <!-- SUMMARY -->
    <div class="summary">

      <div class="summary-box income">

        <h3>Income</h3>

        <p id="incomeAmount">
          ₹0
        </p>

      </div>

      <div class="summary-box expense">

        <h3>Expenses</h3>

        <p id="expenseAmount">
          ₹0
        </p>

      </div>

    </div>

    <!-- TRANSACTIONS -->
    <div class="transactions">

      <h2>Transactions</h2>

      <ul id="transactionList">

        <!-- ITEMS HERE -->

      </ul>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
