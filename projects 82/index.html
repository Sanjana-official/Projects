<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(82)Reaction Time Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">

    <h1>⚡ Reaction Time Tester</h1>

    <p class="info" id="infoText">
      Click start and wait for the screen to turn green.
    </p>

    <!-- GAME AREA -->
    <div class="reaction-box" id="reactionBox">
      Click Start
    </div>

    <!-- BUTTON -->
    <button id="startBtn">
      Start Test
    </button>

    <!-- RESULT -->
    <div class="result" id="result">
      Your reaction time will appear here
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
