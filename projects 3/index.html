<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA_Compatiable" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css parallaax effect</title>
    <link rel="stylesheet" href="main.css" type="text/css">
</head>
<body>
    <div class="parallax_wrapper">

        <div class="parallax_group intro_screen" id="intro">
            INTRO SCREEN
        </div>

        <div class="parallax_group" id="group-1">

            <div class="parallaax_layer base_layer">
                BASE LAYER
            </div>

            <div class="parallaax_layer mid_layer">
                MID LAYER
            </div>

        </div>

        <div class="parallax_group" id="group-2">

            <div class="parallaax_layer mid_layer">
                MID LAYER 2
            </div>

            <div class="parallaax_layer top_layer">
                TOP LAYER
            </div>

        </div>

        <div class="parallax_group outro_screen" id="outro">
            OUTRO SCREEN
        </div>

    </div>
</body>
</html>
