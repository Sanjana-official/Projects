<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(80)Multi Theme Switcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="card">

    <h1>🎨 Multi Theme Switcher</h1>

    <p>
      Change website themes dynamically using
      HTML, CSS and JavaScript.
    </p>

    <!-- THEME BUTTONS -->
    <div class="theme-buttons">

      <button class="theme-btn default" data-theme="default">
        Default
      </button>

      <button class="theme-btn ocean" data-theme="ocean">
        Ocean
      </button>

      <button class="theme-btn sunset" data-theme="sunset">
        Sunset
      </button>

      <button class="theme-btn neon" data-theme="neon">
        Neon
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
